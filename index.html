<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Gemini Chat</title>
    
    <!-- ИКОНКИ -->
    <link rel="icon" type="image/png" href="https://geminirussia.github.io/chat/icon-192.png">
    <link rel="apple-touch-icon" href="https://geminirussia.github.io/chat/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gemini Chat">
    <meta name="theme-color" content="#1a1a1a">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* НОРМАЛЬНЫЕ ЦВЕТА */
        :root {
            --bg-primary: #0f0f13;
            --bg-secondary: #1a1a1e;
            --bg-tertiary: #25252a;
            --bg-hover: #2d2d32;
            --border-color: #2a2a2e;
            --border-light: #3a3a40;
            --text-primary: #e8e8e8;
            --text-secondary: #b0b0b0;
            --text-muted: #6a6a6e;
            --accent: #6366f1;
            --accent-hover: #8183f4;
            --accent-secondary: #8b5cf6;
            --error: #ff6b6b;
            --avatar-user: linear-gradient(135deg, #6366f1, #8b5cf6);
            --avatar-assistant: #2d2d32;
            --message-bg-user: #2d2d32;
            --message-bg-assistant: #1e1e24;
            --input-bg: #1e1e24;
            --scrollbar-track: #1a1a1e;
            --scrollbar-thumb: #3a3a40;
        }

        body.light {
            --bg-primary: #f8f9fa;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f0f2f5;
            --bg-hover: #e9ecef;
            --border-color: #e0e0e0;
            --border-light: #e9ecef;
            --text-primary: #1a1a1a;
            --text-secondary: #4a4a4a;
            --text-muted: #6c757d;
            --accent: #6366f1;
            --accent-hover: #4f52e0;
            --avatar-user: linear-gradient(135deg, #6366f1, #8b5cf6);
            --avatar-assistant: #e9ecef;
            --message-bg-user: #e9ecef;
            --message-bg-assistant: #ffffff;
            --input-bg: #ffffff;
            --scrollbar-track: #e9ecef;
            --scrollbar-thumb: #cbd5e1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg-primary);
            height: 100vh;
            overflow: hidden;
            color: var(--text-primary);
            transition: all 0.2s;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--scrollbar-track); }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 10px; }

        .app { display: flex; height: 100vh; width: 100%; }

        /* САЙДБАР */
        .sidebar {
            width: 300px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .sidebar-header { padding: 24px 20px; border-bottom: 1px solid var(--border-color); }
        .sidebar-header h2 { font-size: 24px; font-weight: 600; display: flex; align-items: center; gap: 10px; color: var(--text-primary); }
        .sidebar-header h2 span { background: var(--avatar-user); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .theme-toggle, .new-chat-btn {
            margin-top: 16px;
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-light);
            border-radius: 28px;
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
        }
        .theme-toggle:hover, .new-chat-btn:hover { background: var(--accent); border-color: var(--accent); color: white; }

        .chats-list { flex: 1; overflow-y: auto; padding: 16px; }
        .chat-item {
            padding: 14px 16px;
            border-radius: 28px;
            margin-bottom: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        .chat-item:hover { background: var(--bg-hover); color: var(--text-primary); }
        .chat-item.active { background: var(--bg-tertiary); color: var(--text-primary); font-weight: 500; }
        .chat-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .chat-delete {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 24px;
            opacity: 0;
            font-size: 16px;
        }
        .chat-item:hover .chat-delete { opacity: 1; }
        .chat-delete:hover { background: var(--bg-tertiary); color: var(--error); }

        .stats-panel { padding: 16px 20px; border-top: 1px solid var(--border-color); font-size: 13px; color: var(--text-muted); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
        .stats-panel div { display: flex; align-items: center; gap: 6px; }

        /* ОСНОВНАЯ ОБЛАСТЬ */
        .main { flex: 1; display: flex; flex-direction: column; background: var(--bg-primary); }
        .chat-header { padding: 16px 28px; border-bottom: 1px solid var(--border-color); text-align: center; }
        .chat-header h3 { font-size: 18px; font-weight: 500; color: var(--text-muted); }

        /* ЦЕНТРИРОВАНИЕ СООБЩЕНИЙ */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            display: flex;
            gap: 16px;
            max-width: 80%;
            animation: fadeIn 0.2s;
        }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.assistant { align-self: flex-start; }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .message.user .message-avatar { background: var(--avatar-user); }
        .message.assistant .message-avatar { background: var(--avatar-assistant); }

        .message-content {
            background: var(--message-bg-assistant);
            padding: 14px 20px;
            border-radius: 24px;
            line-height: 1.5;
            word-break: break-word;
            color: var(--text-primary);
        }
        .message.user .message-content {
            background: var(--message-bg-user);
            border: 1px solid var(--border-light);
        }
        .message-content p { margin-bottom: 8px; }
        .message-content p:last-child { margin-bottom: 0; }
        .message-content pre { background: var(--bg-primary); padding: 14px; border-radius: 16px; overflow-x: auto; margin: 10px 0; }

        /* БОЛЬШОЙ ТЕКСТ НА ПК */
        @media (min-width: 769px) {
            .message-content { font-size: 18px; }
            .message-content p { font-size: 18px; line-height: 1.5; }
            .chat-title { font-size: 15px; }
            .new-chat-btn, .theme-toggle, .stats-panel { font-size: 14px; }
            .sidebar-header h2 { font-size: 26px; }
            .chat-header h3 { font-size: 20px; }
        }

        @media (max-width: 768px) {
            .message-content { font-size: 15px; }
            .sidebar { position: fixed; left: -300px; z-index: 1000; height: 100%; }
            .sidebar.open { left: 0; }
            .menu-toggle { display: block; }
            .message { max-width: 90%; }
            .messages-container { padding: 16px; }
        }

        .input-area { padding: 20px 28px 28px; background: var(--bg-primary); }
        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: var(--input-bg);
            border-radius: 36px;
            padding: 8px 16px;
            border: 1px solid var(--border-light);
            transition: border 0.2s;
        }
        .input-wrapper:focus-within { border-color: var(--accent); }
        .input-wrapper textarea {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 0;
            color: var(--text-primary);
            font-size: 16px;
            resize: none;
            font-family: inherit;
            max-height: 150px;
        }
        .input-wrapper textarea:focus { outline: none; }
        .file-btn, .send-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            font-size: 22px;
            transition: all 0.2s;
        }
        .file-btn:hover, .send-btn:hover { background: var(--bg-tertiary); color: var(--accent); }

        .attachment-preview { margin-top: 12px; display: flex; gap: 10px; flex-wrap: wrap; }
        .attachment-badge { background: var(--bg-tertiary); padding: 6px 14px; border-radius: 24px; font-size: 13px; display: flex; align-items: center; gap: 10px; color: var(--text-primary); }
        .remove-attachment { cursor: pointer; color: var(--error); font-size: 14px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }

        .model-badge {
            position: fixed;
            bottom: 20px;
            right: 24px;
            font-size: 12px;
            color: var(--text-dark);
            background: var(--bg-secondary);
            padding: 6px 14px;
            border-radius: 24px;
            z-index: 100;
            opacity: 0.7;
        }
        @media (max-width: 768px) { .model-badge { font-size: 10px; bottom: 12px; right: 12px; } }

        .menu-toggle {
            display: none;
            position: fixed;
            top: 18px;
            left: 16px;
            z-index: 1001;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-light);
            color: var(--text-primary);
            font-size: 22px;
            cursor: pointer;
            padding: 10px 14px;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <button class="menu-toggle" id="menuToggle">☰</button>
    <div class="app">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>🤖 <span>Gemini Chat</span></h2>
                <button class="theme-toggle" id="themeToggle">🌓 Светлая тема</button>
                <button class="new-chat-btn" id="newChatBtn">+ Новый чат</button>
            </div>
            <div class="chats-list" id="chatsList"></div>
            <div class="stats-panel" id="statsPanel">
                <div>👤 <span id="userName">—</span></div>
                <div>📊 <span id="totalRequests">0</span></div>
                <div>💬 <span id="chatRequests">0</span></div>
            </div>
        </div>
        <div class="main">
            <div class="chat-header">
                <h3 id="chatTitle">Выберите чат</h3>
            </div>
            <div class="messages-container" id="messagesContainer">
                <div style="text-align: center; color: var(--text-muted); margin-top: 40px; font-size: 16px;">✨ Новый чат ✨</div>
            </div>
            <div class="input-area">
                <div class="input-wrapper">
                    <button class="file-btn" id="fileBtn">📎</button>
                    <textarea id="messageInput" rows="1" placeholder="Сообщение..."></textarea>
                    <button class="send-btn" id="sendBtn">➤</button>
                </div>
                <div id="attachmentPreview" class="attachment-preview"></div>
            </div>
        </div>
    </div>
    <div class="model-badge">🧠 Gemini 2.5 Flash</div>
    <input type="file" id="fileInput" style="display: none;" multiple>

    <script>
        const API_KEY = "sk-ClU_Wz5qHqCMpSVbOkiV5JTMDoKcw4sg";
        const API_URL = "https://routerai.ru/api/v1/chat/completions";
        const MODEL = "google/gemini-2.5-flash-lite";

        function initTheme() {
            const saved = localStorage.getItem('gemini_theme');
            if (saved === 'light') {
                document.body.classList.add('light');
                document.getElementById('themeToggle').innerHTML = '🌙 Тёмная';
            } else {
                document.getElementById('themeToggle').innerHTML = '☀️ Светлая';
            }
        }
        function toggleTheme() {
            const isLight = document.body.classList.toggle('light');
            localStorage.setItem('gemini_theme', isLight ? 'light' : 'dark');
            document.getElementById('themeToggle').innerHTML = isLight ? '🌙 Тёмная' : '☀️ Светлая';
        }

        let currentUser = null;
        function initUser() {
            let userId = localStorage.getItem('gemini_user_id');
            let users = JSON.parse(localStorage.getItem('gemini_users') || '{}');
            if (!userId || !users[userId]) {
                userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
                users[userId] = { id: userId, name: 'User_' + userId.substr(-5), totalRequests: 0 };
                localStorage.setItem('gemini_user_id', userId);
                localStorage.setItem('gemini_users', JSON.stringify(users));
            }
            currentUser = users[userId];
            document.getElementById('userName').textContent = currentUser.name;
            updateStats();
        }
        function updateStats() {
            if (!currentUser) return;
            document.getElementById('totalRequests').textContent = currentUser.totalRequests || 0;
            const chat = chats.find(c => c.id === currentChatId);
            if (chat) document.getElementById('chatRequests').textContent = chat.messages.filter(m => m.role === 'user').length;
        }
        function incrementTotal() {
            if (!currentUser) return;
            currentUser.totalRequests++;
            const users = JSON.parse(localStorage.getItem('gemini_users') || '{}');
            users[currentUser.id] = currentUser;
            localStorage.setItem('gemini_users', JSON.stringify(users));
            updateStats();
        }

        let chats = [], currentChatId = null, pendingFiles = [];
        function loadChats() {
            if (!currentUser) return;
            const saved = localStorage.getItem(`chats_${currentUser.id}`);
            if (saved) try { chats = JSON.parse(saved); } catch(e) { chats = []; }
            if (!chats.length) createChat();
            else { currentChatId = chats[0].id; renderChats(); loadChat(); }
            updateStats();
        }
        function saveChats() {
            localStorage.setItem(`chats_${currentUser.id}`, JSON.stringify(chats));
        }
        function createChat() {
            const newChat = { id: Date.now().toString(), title: `Чат ${chats.length + 1}`, messages: [] };
            chats.unshift(newChat);
            currentChatId = newChat.id;
            saveChats();
            renderChats();
            loadChat();
            updateStats();
        }
        function deleteChat(id) {
            if (chats.length === 1) { alert("Нельзя удалить последний"); return; }
            chats = chats.filter(c => c.id !== id);
            if (currentChatId === id) { currentChatId = chats[0].id; loadChat(); }
            saveChats();
            renderChats();
            updateStats();
        }
        function renderChats() {
            const container = document.getElementById('chatsList');
            container.innerHTML = '';
            chats.forEach(chat => {
                const div = document.createElement('div');
                div.className = `chat-item ${currentChatId === chat.id ? 'active' : ''}`;
                div.innerHTML = `<div class="chat-title">${escapeHtml(chat.title)}</div><button class="chat-delete">🗑</button>`;
                div.querySelector('.chat-title').onclick = () => {
                    currentChatId = chat.id;
                    renderChats();
                    loadChat();
                    updateStats();
                    if (innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
                };
                div.querySelector('.chat-delete').onclick = (e) => { e.stopPropagation(); deleteChat(chat.id); };
                container.appendChild(div);
            });
        }
        function loadChat() {
            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) return;
            document.getElementById('chatTitle').innerHTML = `💬 ${escapeHtml(chat.title)}`;
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';
            if (!chat.messages.length) container.innerHTML = '<div style="text-align:center;color:var(--text-muted);margin-top:40px;font-size:16px;">✨ Напишите сообщение ✨</div>';
            else chat.messages.forEach(m => addMessage(m.role, m.content));
            scrollBottom();
            updateStats();
        }
        function addMessage(role, content) {
            const container = document.getElementById('messagesContainer');
            if (container.children.length === 1 && container.children[0].innerText.includes('Напишите')) container.innerHTML = '';
            const div = document.createElement('div');
            div.className = `message ${role}`;
            const avatar = role === 'user' ? '👤' : '🤖';
            const formatted = role === 'assistant' ? marked.parse(content) : `<p>${escapeHtml(content)}</p>`;
            div.innerHTML = `<div class="message-avatar">${avatar}</div><div class="message-content">${formatted}</div>`;
            container.appendChild(div);
            if (role === 'assistant') div.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
            scrollBottom();
        }
        function scrollBottom() { document.getElementById('messagesContainer').scrollTop = document.getElementById('messagesContainer').scrollHeight; }
        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        async function callGemini(msg, files = []) {
            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) return;
            let text = msg;
            if (files.length) text += `\n\n[Файлы: ${files.map(f => f.name).join(', ')}]`;
            chat.messages.push({ role: 'user', content: text });
            saveChats();
            addMessage('user', text);
            incrementTotal();

            const loading = document.createElement('div');
            loading.className = 'message assistant';
            loading.innerHTML = `<div class="message-avatar">🤖</div><div class="message-content"><div style="display:flex;gap:8px;"><div style="width:18px;height:18px;border:2px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;"></div> Думаю...</div></div>`;
            document.getElementById('messagesContainer').appendChild(loading);
            scrollBottom();

            try {
                const history = chat.messages.slice(-10).map(m => ({ role: m.role === 'user' ? 'user' : 'assistant', content: m.content }));
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                    body: JSON.stringify({ model: MODEL, messages: history, temperature: 0.7, max_tokens: 2048 })
                });
                loading.remove();
                if (!res.ok) throw new Error(`Ошибка ${res.status}`);
                const data = await res.json();
                let reply = data.choices[0].message.content || '🤔 Не удалось получить ответ';
                chat.messages.push({ role: 'assistant', content: reply });
                saveChats();
                addMessage('assistant', reply);
                if (chat.messages.length === 2 && chat.title.startsWith('Чат ')) {
                    chat.title = msg.length > 25 ? msg.slice(0, 25) + '...' : msg;
                    saveChats();
                    renderChats();
                    document.getElementById('chatTitle').innerHTML = `💬 ${escapeHtml(chat.title)}`;
                }
            } catch (e) {
                loading.remove();
                const errMsg = `❌ ${e.message}`;
                chat.messages.push({ role: 'assistant', content: errMsg });
                saveChats();
                addMessage('assistant', errMsg);
            }
            updateStats();
        }

        function handleFiles(e) {
            const files = Array.from(e.target.files);
            pendingFiles = [];
            const preview = document.getElementById('attachmentPreview');
            preview.innerHTML = '';
            files.forEach(f => {
                const size = (f.size / 1024).toFixed(1);
                const badge = document.createElement('div');
                badge.className = 'attachment-badge';
                badge.innerHTML = `📎 ${escapeHtml(f.name)} (${size} KB) <span class="remove-attachment">✕</span>`;
                badge.querySelector('.remove-attachment').onclick = () => {
                    pendingFiles = pendingFiles.filter(p => p.name !== f.name);
                    badge.remove();
                };
                preview.appendChild(badge);
                pendingFiles.push(f);
            });
            document.getElementById('fileInput').value = '';
        }

        async function send() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text && !pendingFiles.length) return;
            const msg = text || "Файлы прикреплены";
            input.value = '';
            const files = [...pendingFiles];
            pendingFiles = [];
            document.getElementById('attachmentPreview').innerHTML = '';
            await callGemini(msg, files);
        }

        document.getElementById('newChatBtn').onclick = createChat;
        document.getElementById('themeToggle').onclick = toggleTheme;
        document.getElementById('sendBtn').onclick = send;
        document.getElementById('fileBtn').onclick = () => document.getElementById('fileInput').click();
        document.getElementById('fileInput').onchange = handleFiles;
        document.getElementById('messageInput').onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };
        document.getElementById('menuToggle').onclick = () => document.getElementById('sidebar').classList.toggle('open');

        initTheme();
        initUser();
        loadChats();
    </script>
</body>
</html>
