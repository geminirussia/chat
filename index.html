    <style>
        /* Весь твой CSS остаётся без изменений — он огромный, но я его не трогаю */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-primary: #1a1a1a; --bg-secondary: #1e1e1e; --bg-tertiary: #2a2a2a; --bg-hover: #2d2d2d; --border-color: #2d2d2d; --border-light: #3d3d3d; --text-primary: #e3e3e3; --text-secondary: #b0b0b0; --text-muted: #888; --text-dark: #666; --accent: #8e8eff; --accent-secondary: #a855f7; --success: #4ade80; --error: #ff6b6b; --avatar-user: linear-gradient(135deg, #8e8eff, #a855f7); --avatar-assistant: #2d2d2d; --message-bg-user: #2d2d2d; --message-bg-assistant: #2a2a2a; --input-bg: #2a2a2a; --scrollbar-track: #2a2a2a; --scrollbar-thumb: #5a5a5a; --code-bg: #1a1a1a; }
        body.light { --bg-primary: #ffffff; --bg-secondary: #f8f9fa; --bg-tertiary: #f0f2f5; --bg-hover: #e9ecef; --border-color: #e0e0e0; --border-light: #e9ecef; --text-primary: #1a1a1a; --text-secondary: #4a4a4a; --text-muted: #6c757d; --text-dark: #adb5bd; --accent: #6366f1; --accent-secondary: #8b5cf6; --avatar-user: linear-gradient(135deg, #6366f1, #8b5cf6); --avatar-assistant: #e9ecef; --message-bg-user: #e9ecef; --message-bg-assistant: #f8f9fa; --input-bg: #ffffff; --scrollbar-track: #e9ecef; --scrollbar-thumb: #cbd5e1; --code-bg: #f8f9fa; }
        body { font-family: 'Google Sans', 'Segoe UI', Roboto, -apple-system, sans-serif; background: var(--bg-primary); height: 100vh; overflow: hidden; color: var(--text-primary); transition: background-color 0.3s, color 0.3s; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--scrollbar-track); }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 10px; }
        .app { display: flex; height: 100vh; width: 100%; }
        .sidebar { width: 280px; background: var(--bg-secondary); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; transition: transform 0.2s; }
        .sidebar-header { padding: 20px 16px; border-bottom: 1px solid var(--border-color); }
        .sidebar-header h2 { font-size: 20px; font-weight: 500; display: flex; align-items: center; gap: 8px; color: var(--text-primary); }
        .sidebar-header h2 span { background: var(--avatar-user); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .theme-toggle, .new-chat-btn { margin-top: 12px; width: 100%; padding: 10px 14px; background: var(--bg-tertiary); border: 1px solid var(--border-light); border-radius: 24px; color: var(--text-primary); font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; }
        .theme-toggle:hover, .new-chat-btn:hover { background: var(--bg-hover); border-color: var(--accent); }
        .chats-list { flex: 1; overflow-y: auto; padding: 12px; }
        .chat-item { padding: 10px 14px; border-radius: 24px; margin-bottom: 4px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 14px; color: var(--text-secondary); }
        .chat-item:hover { background: var(--bg-hover); color: var(--text-primary); }
        .chat-item.active { background: var(--bg-tertiary); color: var(--text-primary); }
        .chat-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .chat-delete { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px 8px; border-radius: 20px; opacity: 0; }
        .chat-item:hover .chat-delete { opacity: 1; }
        .chat-delete:hover { background: var(--bg-tertiary); color: var(--error); }
        .stats-panel { padding: 12px 16px; border-top: 1px solid var(--border-color); font-size: 12px; color: var(--text-muted); }
        .main { flex: 1; display: flex; flex-direction: column; background: var(--bg-primary); }
        .chat-header { padding: 12px 24px; border-bottom: 1px solid var(--border-color); }
        .chat-header h3 { font-size: 14px; font-weight: 400; color: var(--text-muted); }
        .messages-container { flex: 1; overflow-y: auto; padding: 20px 24px; }
        @media (min-width: 769px) { .message-content { font-size: 16px; } }
        @media (max-width: 768px) { .message-content { font-size: 14px; } .sidebar { position: fixed; left: -280px; z-index: 1000; } .sidebar.open { left: 0; } .menu-toggle { display: block; } }
        .message { display: flex; gap: 16px; margin-bottom: 24px; animation: fadeIn 0.3s; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.assistant { align-self: flex-start; }
        .message-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
        .message.user .message-avatar { background: var(--avatar-user); }
        .message.assistant .message-avatar { background: var(--avatar-assistant); }
        .message-content { background: var(--message-bg-assistant); padding: 12px 18px; border-radius: 24px; line-height: 1.5; word-break: break-word; color: var(--text-primary); }
        .message.user .message-content { background: var(--message-bg-user); border: 1px solid var(--border-light); }
        .message-content pre { background: var(--code-bg); padding: 12px; border-radius: 16px; overflow-x: auto; margin: 8px 0; }
        .input-area { padding: 16px 24px 24px; background: var(--bg-primary); }
        .input-wrapper { display: flex; gap: 12px; align-items: flex-end; background: var(--input-bg); border-radius: 32px; padding: 8px 16px; border: 1px solid var(--border-light); transition: border 0.2s; }
        .input-wrapper:focus-within { border-color: var(--accent); }
        .input-wrapper textarea { flex: 1; background: transparent; border: none; padding: 10px 0; color: var(--text-primary); font-size: 14px; resize: none; font-family: inherit; max-height: 150px; }
        .input-wrapper textarea:focus { outline: none; }
        .file-btn, .send-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 8px; border-radius: 50%; font-size: 20px; }
        .file-btn:hover, .send-btn:hover { background: var(--bg-tertiary); color: var(--accent); }
        .attachment-preview { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
        .attachment-badge { background: var(--bg-tertiary); padding: 4px 12px; border-radius: 20px; font-size: 12px; display: flex; align-items: center; gap: 8px; color: var(--text-primary); }
        .remove-attachment { cursor: pointer; color: var(--error); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        .model-badge { position: fixed; bottom: 16px; right: 20px; font-size: 11px; color: var(--text-dark); background: var(--bg-secondary); padding: 6px 12px; border-radius: 20px; z-index: 100; }
        @media (max-width: 768px) { .model-badge { font-size: 9px; bottom: 12px; right: 12px; } }
        .menu-toggle { display: none; position: fixed; top: 16px; left: 16px; z-index: 1001; background: var(--bg-tertiary); border: 1px solid var(--border-light); color: var(--text-primary); font-size: 20px; cursor: pointer; padding: 8px 12px; border-radius: 50%; }
    </style>
</head>
<body>
    <button class="menu-toggle" id="menuToggle">☰</button>
    <div class="app">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>🤖 <span>Gemini Chat</span></h2>
                <button class="theme-toggle" id="themeToggle">🌓 Светлая тема</button>
                <button class="new-chat-btn" id="newChatBtn">+ Новый чат</button>
            </div>
            <div class="chats-list" id="chatsList"></div>
            <div class="stats-panel" id="statsPanel">
                <div>👤 Пользователь: <span id="userName">Загрузка...</span></div>
                <div>📊 Всего запросов: <span id="totalRequests">0</span></div>
                <div>💬 В этом чате: <span id="chatRequests">0</span></div>
            </div>
        </div>
        <div class="main">
            <div class="chat-header">
                <h3 id="chatTitle">Выберите или создайте чат</h3>
            </div>
            <div class="messages-container" id="messagesContainer">
                <div style="text-align: center; color: var(--text-muted); margin-top: 40px;">✨ Создайте новый чат и начните общение ✨</div>
            </div>
            <div class="input-area">
                <div class="input-wrapper">
                    <button class="file-btn" id="fileBtn" title="Прикрепить файл">📎</button>
                    <textarea id="messageInput" rows="1" placeholder="Введите сообщение..."></textarea>
                    <button class="send-btn" id="sendBtn">➤</button>
                </div>
                <div id="attachmentPreview" class="attachment-preview"></div>
            </div>
        </div>
    </div>
    <div class="model-badge">🧠 Gemini 2.5 Flash — RouterAI</div>
    <input type="file" id="fileInput" style="display: none;" multiple>

    <script>
        const API_KEY = "sk-ClU_Wz5qHqCMpSVbOkiV5JTMDoKcw4sg";
        const API_URL = "https://routerai.ru/api/v1/chat/completions";
        const MODEL = "google/gemini-2.5-flash-lite";

        function initTheme() {
            const savedTheme = localStorage.getItem('gemini_theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light');
                document.getElementById('themeToggle').innerHTML = '🌙 Тёмная тема';
            } else {
                document.body.classList.remove('light');
                document.getElementById('themeToggle').innerHTML = '☀️ Светлая тема';
            }
        }
        function toggleTheme() {
            const isLight = document.body.classList.toggle('light');
            localStorage.setItem('gemini_theme', isLight ? 'light' : 'dark');
            document.getElementById('themeToggle').innerHTML = isLight ? '🌙 Тёмная тема' : '☀️ Светлая тема';
        }

        let currentUser = null;
        function initUser() {
            let userId = localStorage.getItem('gemini_user_id');
            let users = JSON.parse(localStorage.getItem('gemini_users') || '{}');
            if (!userId || !users[userId]) {
                userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
                users[userId] = { id: userId, name: 'User_' + userId.substr(-6), createdAt: new Date().toISOString(), totalRequests: 0, chats: [] };
                localStorage.setItem('gemini_user_id', userId);
                localStorage.setItem('gemini_users', JSON.stringify(users));
            }
            currentUser = users[userId];
            document.getElementById('userName').textContent = currentUser.name;
            updateStats();
        }
        function updateStats() {
            if (!currentUser) return;
            document.getElementById('totalRequests').textContent = currentUser.totalRequests || 0;
            const chat = chats.find(c => c.id === currentChatId);
            if (chat) document.getElementById('chatRequests').textContent = chat.messages.filter(m => m.role === 'user').length;
        }
        function incrementTotalRequests() {
            if (!currentUser) return;
            currentUser.totalRequests++;
            const users = JSON.parse(localStorage.getItem('gemini_users') || '{}');
            users[currentUser.id] = currentUser;
            localStorage.setItem('gemini_users', JSON.stringify(users));
            updateStats();
        }

        let chats = [], currentChatId = null, pendingFiles = [];
        function loadChats() {
            if (!currentUser) return;
            const saved = localStorage.getItem(`gemini_chats_${currentUser.id}`);
            if (saved) try { chats = JSON.parse(saved); } catch(e) { chats = []; }
            if (chats.length === 0) createNewChat();
            else { currentChatId = chats[0].id; renderChatsList(); loadCurrentChat(); }
            updateStats();
        }
        function saveChats() {
            if (!currentUser) return;
            localStorage.setItem(`gemini_chats_${currentUser.id}`, JSON.stringify(chats));
            currentUser.chats = chats.map(c => ({ id: c.id, title: c.title }));
            const users = JSON.parse(localStorage.getItem('gemini_users') || '{}');
            users[currentUser.id] = currentUser;
            localStorage.setItem('gemini_users', JSON.stringify(users));
        }
        function createNewChat() {
            const newChat = { id: Date.now().toString(), title: `Чат ${chats.length + 1}`, messages: [], createdAt: new Date().toISOString() };
            chats.unshift(newChat);
            currentChatId = newChat.id;
            saveChats();
            renderChatsList();
            loadCurrentChat();
            updateStats();
        }
        function deleteChat(chatId) {
            if (chats.length === 1) { alert("Нельзя удалить последний чат"); return; }
            chats = chats.filter(c => c.id !== chatId);
            if (currentChatId === chatId) { currentChatId = chats[0].id; loadCurrentChat(); }
            saveChats();
            renderChatsList();
            updateStats();
        }
        function renderChatsList() {
            const container = document.getElementById('chatsList');
            container.innerHTML = '';
            chats.forEach(chat => {
                const div = document.createElement('div');
                div.className = `chat-item ${currentChatId === chat.id ? 'active' : ''}`;
                div.innerHTML = `<div class="chat-title" data-id="${chat.id}">${escapeHtml(chat.title)}</div><button class="chat-delete" data-id="${chat.id}">🗑</button>`;
                div.querySelector('.chat-title').addEventListener('click', () => {
                    currentChatId = chat.id;
                    renderChatsList();
                    loadCurrentChat();
                    updateStats();
                    if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
                });
                div.querySelector('.chat-delete').addEventListener('click', (e) => { e.stopPropagation(); deleteChat(chat.id); });
                container.appendChild(div);
            });
        }
        function loadCurrentChat() {
            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) return;
            document.getElementById('chatTitle').innerHTML = `💬 ${escapeHtml(chat.title)}`;
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';
            if (chat.messages.length === 0) container.innerHTML = '<div style="text-align: center; color: var(--text-muted); margin-top: 40px;">✨ Напишите первое сообщение ✨</div>';
            else chat.messages.forEach(msg => appendMessageToUI(msg.role, msg.content));
            scrollToBottom();
            updateStats();
        }
        function appendMessageToUI(role, content) {
            const container = document.getElementById('messagesContainer');
            if (container.children.length === 1 && container.children[0].innerText.includes('Напишите первое')) container.innerHTML = '';
            const div = document.createElement('div');
            div.className = `message ${role}`;
            const avatar = role === 'user' ? '👤' : '🤖';
            const formatted = role === 'assistant' ? marked.parse(content) : `<p>${escapeHtml(content)}</p>`;
            div.innerHTML = `<div class="message-avatar">${avatar}</div><div class="message-content">${formatted}</div>`;
            container.appendChild(div);
            if (role === 'assistant') div.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
            scrollToBottom();
        }
        function scrollToBottom() { document.getElementById('messagesContainer').scrollTop = document.getElementById('messagesContainer').scrollHeight; }
        function escapeHtml(text) { const d = document.createElement('div'); d.textContent = text; return d.innerHTML; }

        async function callGemini(userMessage, attachments = []) {
            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) return;
            let finalMessage = userMessage;
            if (attachments.length > 0) finalMessage = userMessage ? `${userMessage}\n\n[Файлы: ${attachments.map(f => f.name).join(', ')}]` : `[Файлы: ${attachments.map(f => f.name).join(', ')}]`;
            chat.messages.push({ role: 'user', content: finalMessage });
            saveChats();
            appendMessageToUI('user', finalMessage);
            incrementTotalRequests();

            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.innerHTML = `<div class="message-avatar">🤖</div><div class="message-content"><div style="display:flex;align-items:center;gap:8px;"><div style="width:16px;height:16px;border:2px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;"></div> Думаю...</div></div>`;
            document.getElementById('messagesContainer').appendChild(loadingDiv);
            scrollToBottom();

            try {
                const historyMessages = chat.messages.slice(-10).map(msg => ({ role: msg.role === 'user' ? 'user' : 'assistant', content: msg.content }));
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                    body: JSON.stringify({ model: MODEL, messages: historyMessages, temperature: 0.7, max_tokens: 2048 })
                });
                loadingDiv.remove();
                if (!response.ok) throw new Error(`API ошибка ${response.status}`);
                const data = await response.json();
                let reply = data.choices[0].message.content;
                if (!reply) reply = '🤔 Не удалось получить ответ';
                chat.messages.push({ role: 'assistant', content: reply });
                saveChats();
                appendMessageToUI('assistant', reply);
                if (chat.messages.length === 2 && chat.title.startsWith('Чат ')) {
                    chat.title = userMessage.length > 30 ? userMessage.substring(0, 30) + '...' : userMessage;
                    saveChats();
                    renderChatsList();
                    document.getElementById('chatTitle').innerHTML = `💬 ${escapeHtml(chat.title)}`;
                }
            } catch (error) {
                loadingDiv.remove();
                chat.messages.push({ role: 'assistant', content: `❌ Ошибка: ${error.message}` });
                saveChats();
                appendMessageToUI('assistant', `❌ Ошибка: ${error.message}`);
            }
            updateStats();
        }

        function handleFileSelect(e) {
            const files = Array.from(e.target.files);
            pendingFiles = [];
            const preview = document.getElementById('attachmentPreview');
            preview.innerHTML = '';
            files.forEach(file => {
                const size = (file.size / 1024).toFixed(1);
                const badge = document.createElement('div');
                badge.className = 'attachment-badge';
                badge.innerHTML = `📎 ${escapeHtml(file.name)} (${size} KB) <span class="remove-attachment">✕</span>`;
                badge.querySelector('.remove-attachment').addEventListener('click', () => {
                    pendingFiles = pendingFiles.filter(f => f.name !== file.name);
                    badge.remove();
                });
                preview.appendChild(badge);
                pendingFiles.push({ name: file.name, type: file.type, size: file.size, file: file });
            });
            document.getElementById('fileInput').value = '';
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text && pendingFiles.length === 0) return;
            const message = text || "Посмотрите на прикреплённые файлы";
            input.value = '';
            const filesCopy = [...pendingFiles];
            pendingFiles = [];
            document.getElementById('attachmentPreview').innerHTML = '';
            await callGemini(message, filesCopy);
        }

        document.getElementById('newChatBtn').addEventListener('click', createNewChat);
        document.getElementById('themeToggle').addEventListener('click', toggleTheme);
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('fileBtn').addEventListener('click', () => document.getElementById('fileInput').click());
        document.getElementById('fileInput').addEventListener('change', handleFileSelect);
        document.getElementById('messageInput').addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
        document.getElementById('menuToggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));

        initTheme();
        initUser();
        loadChats();
    </script>
</body>
</html>
