<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Gemini Chat</title>
    
    <link rel="icon" type="image/png" href="https://geminirussia.github.io/chat/icon-192.png">
    <link rel="apple-touch-icon" href="https://geminirussia.github.io/chat/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gemini Chat">
    <meta name="theme-color" content="#0f0f13">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0f0f13;
            --bg-sidebar: #1a1a1e;
            --bg-card: #25252a;
            --bg-hover: #2d2d32;
            --border: #2a2a2e;
            --text: #e8e8e8;
            --text-secondary: #a0a0a0;
            --accent: #6366f1;
            --accent-hover: #8183f4;
            --user-msg: #2d2d32;
            --ai-msg: #1e1e24;
            --input-bg: #1e1e24;
        }

        body.light {
            --bg: #f5f5f7;
            --bg-sidebar: #ffffff;
            --bg-card: #e8e8ec;
            --bg-hover: #e0e0e4;
            --border: #e0e0e0;
            --text: #1a1a1a;
            --text-secondary: #4a4a4a;
            --accent: #6366f1;
            --user-msg: #e8e8ec;
            --ai-msg: #ffffff;
            --input-bg: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            height: 100vh;
            overflow: hidden;
            color: var(--text);
        }

        /* ЧИСТЫЙ СКРОЛЛ */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3a3a40; border-radius: 10px; }

        .app { display: flex; height: 100vh; width: 100%; }

        /* САЙДБАР — ПРОСТОЙ И ПОНЯТНЫЙ */
        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
        .sidebar-header h2 { font-size: 22px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
        .sidebar-header span { color: var(--accent); }

        .theme-toggle, .new-chat-btn {
            margin-top: 12px;
            width: 100%;
            padding: 10px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .theme-toggle:hover, .new-chat-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .chat-item {
            padding: 10px 12px;
            border-radius: 20px;
            margin-bottom: 4px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: var(--text-secondary);
        }
        .chat-item:hover { background: var(--bg-hover); color: var(--text); }
        .chat-item.active { background: var(--bg-card); color: var(--text); font-weight: 500; }
        .chat-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .chat-delete {
            background: none;
            border: none;
            color: #6a6a6e;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 20px;
            opacity: 0;
        }
        .chat-item:hover .chat-delete { opacity: 1; }
        .chat-delete:hover { color: #ff6b6b; background: #2a2a2e; }

        /* ОСНОВНОЕ ОКНО */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg);
        }
        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }
        .chat-header h3 {
            font-size: 16px;
            font-weight: 400;
            color: var(--text-secondary);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 80%;
        }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.assistant { align-self: flex-start; }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            background: var(--bg-card);
        }
        .message.user .message-avatar { background: var(--accent); }
        .message.assistant .message-avatar { background: var(--bg-card); }

        .message-content {
            background: var(--ai-msg);
            padding: 10px 16px;
            border-radius: 20px;
            line-height: 1.45;
            font-size: 15px;
        }
        .message.user .message-content {
            background: var(--user-msg);
            border: 1px solid var(--border);
        }
        .message-content pre {
            background: var(--bg);
            padding: 10px;
            border-radius: 12px;
            overflow-x: auto;
            margin: 6px 0;
            font-size: 13px;
        }

        /* НА ПК ТЕКСТ КРУПНЕЕ */
        @media (min-width: 769px) {
            .message-content { font-size: 16px; }
        }

        @media (max-width: 768px) {
            .message-content { font-size: 14px; }
            .sidebar { width: 260px; }
            .message { max-width: 90%; }
            .messages-container { padding: 16px; }
        }

        .input-area { padding: 16px 24px 24px; background: var(--bg); }
        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            background: var(--input-bg);
            border-radius: 28px;
            padding: 6px 12px;
            border: 1px solid var(--border);
        }
        .input-wrapper:focus-within { border-color: var(--accent); }
        .input-wrapper textarea {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 0;
            color: var(--text);
            font-size: 15px;
            resize: none;
            font-family: inherit;
            max-height: 120px;
        }
        .input-wrapper textarea:focus { outline: none; }
        .file-btn, .send-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            font-size: 20px;
        }
        .file-btn:hover, .send-btn:hover { background: var(--bg-card); color: var(--accent); }

        .attachment-preview { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
        .attachment-badge {
            background: var(--bg-card);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .remove-attachment { cursor: pointer; color: #ff6b6b; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        .message { animation: fadeIn 0.2s; }

        .model-badge {
            position: fixed;
            bottom: 12px;
            right: 16px;
            font-size: 10px;
            color: #6a6a6e;
            background: var(--bg-card);
            padding: 4px 12px;
            border-radius: 20px;
            z-index: 100;
        }

        /* МОБИЛЬНОЕ МЕНЮ — ТОЛЬКО КНОПКА СЛЕВА */
        .menu-toggle {
            display: none;
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1000;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 20px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 50%;
        }
        @media (max-width: 768px) {
            .menu-toggle { display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; }
            .sidebar {
                position: fixed;
                left: -280px;
                top: 0;
                height: 100%;
                z-index: 1001;
                transition: left 0.2s;
            }
            .sidebar.open { left: 0; box-shadow: 4px 0 20px rgba(0,0,0,0.4); }
            .chat-header { padding-left: 70px; }
        }
    </style>
</head>
<body>
    <button class="menu-toggle" id="menuToggle">☰</button>
    <div class="app">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>🤖 <span>Gemini</span></h2>
                <button class="theme-toggle" id="themeToggle">Светлая тема</button>
                <button class="new-chat-btn" id="newChatBtn">+ Новый чат</button>
            </div>
            <div class="chats-list" id="chatsList"></div>
        </div>
        <div class="main">
            <div class="chat-header">
                <h3 id="chatTitle">Новый чат</h3>
            </div>
            <div class="messages-container" id="messagesContainer">
                <div style="text-align: center; color: var(--text-secondary); margin-top: 50px;">✨ Напишите сообщение ✨</div>
            </div>
            <div class="input-area">
                <div class="input-wrapper">
                    <button class="file-btn" id="fileBtn">📎</button>
                    <textarea id="messageInput" rows="1" placeholder="Сообщение..."></textarea>
                    <button class="send-btn" id="sendBtn">➤</button>
                </div>
                <div id="attachmentPreview" class="attachment-preview"></div>
            </div>
        </div>
    </div>
    <div class="model-badge">Gemini 2.5 Flash</div>
    <input type="file" id="fileInput" style="display: none;" multiple>

    <script>
        const API_KEY = "sk-ClU_Wz5qHqCMpSVbOkiV5JTMDoKcw4sg";
        const API_URL = "https://routerai.ru/api/v1/chat/completions";
        const MODEL = "google/gemini-2.5-flash-lite";

        function initTheme() {
            const saved = localStorage.getItem('gemini_theme');
            if (saved === 'light') {
                document.body.classList.add('light');
                document.getElementById('themeToggle').innerHTML = '🌙 Тёмная';
            } else {
                document.getElementById('themeToggle').innerHTML = '☀️ Светлая';
            }
        }
        function toggleTheme() {
            const isLight = document.body.classList.toggle('light');
            localStorage.setItem('gemini_theme', isLight ? 'light' : 'dark');
            document.getElementById('themeToggle').innerHTML = isLight ? '🌙 Тёмная' : '☀️ Светлая';
        }

        let currentUser = null;
        function initUser() {
            let userId = localStorage.getItem('gemini_user_id');
            let users = JSON.parse(localStorage.getItem('gemini_users') || '{}');
            if (!userId || !users[userId]) {
                userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
                users[userId] = { id: userId, totalRequests: 0 };
                localStorage.setItem('gemini_user_id', userId);
                localStorage.setItem('gemini_users', JSON.stringify(users));
            }
            currentUser = users[userId];
        }
        function incrementTotal() {
            if (!currentUser) return;
            currentUser.totalRequests++;
            const users = JSON.parse(localStorage.getItem('gemini_users') || '{}');
            users[currentUser.id] = currentUser;
            localStorage.setItem('gemini_users', JSON.stringify(users));
        }

        let chats = [], currentChatId = null, pendingFiles = [];
        
        function loadChats() {
            if (!currentUser) return;
            const saved = localStorage.getItem(`chats_${currentUser.id}`);
            if (saved) try { chats = JSON.parse(saved); } catch(e) { chats = []; }
            if (!chats.length) createChat();
            else { currentChatId = chats[0].id; renderChats(); loadChat(); }
        }
        function saveChats() { localStorage.setItem(`chats_${currentUser.id}`, JSON.stringify(chats)); }
        function createChat() {
            const newChat = { id: Date.now().toString(), title: `Чат ${chats.length + 1}`, messages: [] };
            chats.unshift(newChat);
            currentChatId = newChat.id;
            saveChats();
            renderChats();
            loadChat();
            if (window.innerWidth <= 768) closeSidebar();
        }
        function deleteChat(id) {
            if (chats.length === 1) { alert("Нельзя удалить последний чат"); return; }
            chats = chats.filter(c => c.id !== id);
            if (currentChatId === id) { currentChatId = chats[0].id; loadChat(); }
            saveChats();
            renderChats();
        }
        function renderChats() {
            const container = document.getElementById('chatsList');
            container.innerHTML = '';
            chats.forEach(chat => {
                const div = document.createElement('div');
                div.className = `chat-item ${currentChatId === chat.id ? 'active' : ''}`;
                div.innerHTML = `<div class="chat-title">${escapeHtml(chat.title)}</div><button class="chat-delete">🗑</button>`;
                div.querySelector('.chat-title').onclick = () => {
                    currentChatId = chat.id;
                    renderChats();
                    loadChat();
                    if (window.innerWidth <= 768) closeSidebar();
                };
                div.querySelector('.chat-delete').onclick = (e) => { e.stopPropagation(); deleteChat(chat.id); };
                container.appendChild(div);
            });
        }
        function loadChat() {
            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) return;
            document.getElementById('chatTitle').innerHTML = `💬 ${escapeHtml(chat.title)}`;
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';
            if (!chat.messages.length) container.innerHTML = '<div style="text-align:center;color:var(--text-secondary);margin-top:50px;">✨ Напишите сообщение ✨</div>';
            else chat.messages.forEach(m => addMessage(m.role, m.content));
            scrollBottom();
        }
        function addMessage(role, content) {
            const container = document.getElementById('messagesContainer');
            if (container.children.length === 1 && container.children[0].innerText.includes('Напишите')) container.innerHTML = '';
            const div = document.createElement('div');
            div.className = `message ${role}`;
            const avatar = role === 'user' ? '👤' : '🤖';
            const formatted = role === 'assistant' ? marked.parse(content) : `<p>${escapeHtml(content)}</p>`;
            div.innerHTML = `<div class="message-avatar">${avatar}</div><div class="message-content">${formatted}</div>`;
            container.appendChild(div);
            if (role === 'assistant') div.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
            scrollBottom();
        }
        function scrollBottom() { document.getElementById('messagesContainer').scrollTop = document.getElementById('messagesContainer').scrollHeight; }
        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        function openSidebar() { document.getElementById('sidebar').classList.add('open'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }

        async function callGemini(msg, files = []) {
            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) return;
            let text = msg;
            if (files.length) text += `\n\n[Файлы: ${files.map(f => f.name).join(', ')}]`;
            chat.messages.push({ role: 'user', content: text });
            saveChats();
            addMessage('user', text);
            incrementTotal();

            const loading = document.createElement('div');
            loading.className = 'message assistant';
            loading.innerHTML = `<div class="message-avatar">🤖</div><div class="message-content"><div style="display:flex;gap:6px;align-items:center;"><div style="width:14px;height:14px;border:2px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;"></div> Думаю...</div></div>`;
            document.getElementById('messagesContainer').appendChild(loading);
            scrollBottom();

            try {
                const history = chat.messages.slice(-10).map(m => ({ role: m.role === 'user' ? 'user' : 'assistant', content: m.content }));
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                    body: JSON.stringify({ model: MODEL, messages: history, temperature: 0.7, max_tokens: 2048 })
                });
                loading.remove();
                if (!res.ok) throw new Error(`Ошибка ${res.status}`);
                const data = await res.json();
                let reply = data.choices[0].message.content || '🤔 Не удалось получить ответ';
                chat.messages.push({ role: 'assistant', content: reply });
                saveChats();
                addMessage('assistant', reply);
                if (chat.messages.length === 2 && chat.title.startsWith('Чат ')) {
                    chat.title = msg.length > 25 ? msg.slice(0, 25) + '...' : msg;
                    saveChats();
                    renderChats();
                    document.getElementById('chatTitle').innerHTML = `💬 ${escapeHtml(chat.title)}`;
                }
            } catch (e) {
                loading.remove();
                const errMsg = `❌ ${e.message}`;
                chat.messages.push({ role: 'assistant', content: errMsg });
                saveChats();
                addMessage('assistant', errMsg);
            }
        }

        function handleFiles(e) {
            const files = Array.from(e.target.files);
            pendingFiles = [];
            const preview = document.getElementById('attachmentPreview');
            preview.innerHTML = '';
            files.forEach(f => {
                const size = (f.size / 1024).toFixed(1);
                const badge = document.createElement('div');
                badge.className = 'attachment-badge';
                badge.innerHTML = `📎 ${escapeHtml(f.name)} (${size} KB) <span class="remove-attachment">✕</span>`;
                badge.querySelector('.remove-attachment').onclick = () => {
                    pendingFiles = pendingFiles.filter(p => p.name !== f.name);
                    badge.remove();
                };
                preview.appendChild(badge);
                pendingFiles.push(f);
            });
            document.getElementById('fileInput').value = '';
        }

        async function send() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text && !pendingFiles.length) return;
            const msg = text || "Файлы прикреплены";
            input.value = '';
            const files = [...pendingFiles];
            pendingFiles = [];
            document.getElementById('attachmentPreview').innerHTML = '';
            await callGemini(msg, files);
        }

        document.getElementById('newChatBtn').onclick = createChat;
        document.getElementById('themeToggle').onclick = toggleTheme;
        document.getElementById('sendBtn').onclick = send;
        document.getElementById('fileBtn').onclick = () => document.getElementById('fileInput').click();
        document.getElementById('fileInput').onchange = handleFiles;
        document.getElementById('messageInput').onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };
        document.getElementById('menuToggle').onclick = openSidebar;

        initTheme();
        initUser();
        loadChats();
    </script>
</body>
</html>
